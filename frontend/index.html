<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C9A84C" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Inkbook" />

    <!-- SEO -->
    <meta name="description" content="Book a tattoo with Miguel. Instant estimate, real dates, no DMs." />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZL74EXY0H6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZL74EXY0H6');
    </script>

    <title>Inkbook · Booking with Miguel</title>
  </head>
  <body>
    <!-- Netlify Forms: static registration for client-rendered artist onboarding -->
    <form name="artist-onboarding" method="POST" data-netlify="true" netlify hidden>
      <input type="text" name="name" />
      <input type="text" name="profile_photo_url" />
      <input type="text" name="studio_name" />
      <input type="text" name="city" />
      <input type="text" name="state" />
      <textarea name="bio"></textarea>
      <input type="text" name="specialties" />
      <input type="text" name="pricing_json" />
      <input type="text" name="phone_number" />
      <input type="text" name="scheduling_tool" />
      <input type="text" name="scheduling_tool_other" />
      <input type="email" name="email" />
      <input type="text" name="instagram_handle" />
      <textarea name="notes"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(err => console.log('SW registration failed:', err))
        })
      }
    </script>
  </body>
</html>
